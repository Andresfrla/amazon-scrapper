services:
  - type: web
    name: amazon-scraper-api
    env: python
    plan: free
    buildCommand: pip install -r requirements-render.txt && python -m playwright install chromium
    startCommand: python -m playwright install chromium && uvicorn scraper_service.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUTF8
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/opt/render/project/.cache/ms-playwright"