services:
  - type: web
    name: amazon-scraper-api
    env: python
    plan: free
    buildCommand: pip install -r requirements-render.txt && python -m playwright install chromium
    startCommand: uvicorn scraper_service.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUTF8
        value: "1"